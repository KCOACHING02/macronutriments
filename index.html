    // ── SECTION 3: SCORING LOGIC ──
    function computeScores(answers) {
      // Calcule les scores pour chacune des 12 voies business
      const scores = {
        produits_propres: 0, mrr: 0, etsy_pod: 0, coaching: 0,
        freelance: 0, closer: 0, ugc: 0, creatrice: 0,
        affiliation: 0, ia_tech: 0, code_liberte: 0, reconnexion: 0,
      };

      answers.forEach((optIdx, qIdx) => {
        const opt = questions[qIdx]?.options[optIdx];
        if (!opt) return;
        Object.entries(opt.s || {}).forEach(([key, val]) => {
          if (scores[key] !== undefined) {
            scores[key] += val;
          }
        });
      });

      return scores;
    }

    function detectVoies(scores) {
      // Trie les voies par score décroissant
      const ranked = Object.entries(scores)
        .sort(([, a], [, b]) => b - a)
        .map(([id, score]) => ({ id, score }));

      // Sécurité : si reconnexion > 5 OU code_liberte > 8, on les force en haut
      // (signaux forts d'avoir besoin d'accompagnement avant tout)
      if (scores.reconnexion >= 5) {
        const reconnexionEntry = ranked.find(v => v.id === "reconnexion");
        if (reconnexionEntry) {
          ranked.splice(ranked.indexOf(reconnexionEntry), 1);
          ranked.unshift(reconnexionEntry);
        }
      } else if (scores.code_liberte >= 8) {
        const clEntry = ranked.find(v => v.id === "code_liberte");
        if (clEntry) {
          ranked.splice(ranked.indexOf(clEntry), 1);
          ranked.unshift(clEntry);
        }
      }

      return {
        voiePrincipale: ranked[0].id,
        voieAlternative: ranked[1]?.id || ranked[0].id,
        ranked,
        scores,
      };
    }

      const voieAlternative = VOIES[voieAlternativeId];

        const q = questions[qIdx];
        const opt = q.options[optIdx];
        return `Q${qIdx + 1} (${q.bloc}) : ${q.text}\n→ ${opt.label}`;
      }).join("\n\n");

      // Top scores des voies
      const topScores = Object.entries(scores)
        .filter(([, v]) => v > 0)
        .sort(([, a], [, b]) => b - a)
        .slice(0, 6)
        .map(([k, v]) => `${k}: ${v}`)
        .join(", ");

IMPORTANT : N'UTILISE AUCUN EMOJI dans ta réponse JSON. Uniquement du texte pur.

VOIE PRINCIPALE DÉTECTÉE : ${voiePrincipale.nom}
TAGLINE : ${voiePrincipale.tagline}
DESCRIPTION DE LA VOIE : ${voiePrincipale.description}
PROFIL IDÉAL : ${voiePrincipale.ideal_pour}

VOIE ALTERNATIVE : ${voieAlternative.nom}
DESCRIPTION ALTERNATIVE : ${voieAlternative.description}

${formatted}

═══════════════════════════════════════
INSTRUCTIONS CRITIQUES :
═══════════════════════════════════════

1. Tu dois lui dire CONCRÈTEMENT quelle voie est faite pour elle ET POURQUOI (en utilisant SES réponses).
2. Tu dois lui donner UNE IDÉE DE BUSINESS PRÉCISE qui combine sa passion + son savoir-faire + son style. Pas générique. Exemple : "Crée un ebook 'Cuisine sans gluten en 15 min' pour mamans débordées" — pas juste "fais un ebook".
3. Tu dois donner un PREMIER PAS concret à faire CETTE SEMAINE.
4. Tu dois expliquer pourquoi Code Liberté est SA rampe de lancement personnelle (en connectant à sa voie principale).
5. Sois directe, chaude, intime. Tu utilises "tu". Pas de jargon coach mou.
6. PAS d'emojis dans le texte.

    // ── SECTION 5: APP COMPONENT ──
    function App() {
      const [step, setStep] = useState("intro"); // intro | quiz | loading | result
      const [current, setCurrent] = useState(0);
      const [answers, setAnswers] = useState(Array(questions.length).fill(null));
      const [bilan, setBilan] = useState(null);
      const [archetype, setArchetype] = useState(null);
      const [leaving, setLeaving] = useState(false);
      const [loadingMsg, setLoadingMsg] = useState(0);
      const [shareCopied, setShareCopied] = useState(false);

      const q = questions[current];
      const progress = ((current) / questions.length) * 100;
      const currentAnswer = answers[current];
      const allAnswered = answers.every(a => a !== null);

      const LOADING_MSGS = [
        "Analyse de tes réponses…",
        "Identification de ton archétype…",
        "Détection de tes patterns invisibles…",
        "Construction de ton diagnostic…",
        "Rédaction de ton bilan personnalisé…",
      ];

      useEffect(() => {
        if (step === "loading") {
          const interval = setInterval(() => {
            setLoadingMsg(prev => (prev + 1) % LOADING_MSGS.length);
          }, 1700);
          return () => clearInterval(interval);
        }
      }, [step]);

      const go = (fn) => { setLeaving(true); setTimeout(() => { fn(); setLeaving(false); }, 280); };

      const handleSelect = (optIdx) => {
        const newAnswers = [...answers];
        newAnswers[current] = optIdx;
        setAnswers(newAnswers);

        // Auto-avance après 350ms
        setTimeout(() => {
          go(() => {
            if (current + 1 < questions.length) {
              setCurrent(current + 1);
            } else {
              generateBilan(newAnswers);
            }
          });
        }, 350);
      };

      const handleBack = () => {
        if (current > 0) go(() => setCurrent(current - 1));
      };

      const generateBilan = async (finalAnswers) => {
        setStep("loading");
        try {
          const scores = computeScores(finalAnswers);
          const detection = detectArchetype(scores);
          const archId = detection.archetype;
          setArchetype(ARCHETYPES[archId]);

          const prompt = buildPrompt(finalAnswers, archId, scores);
          const response = await fetch("/api/bilan", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              system: "Tu es un coach expert en psychologie comportementale. Tu réponds UNIQUEMENT en JSON valide, sans markdown, sans backticks, sans aucun texte avant ou après le JSON.",
              messages: [{ role: "user", content: prompt }],
            }),
          });
          const data = await response.json();
          if (data.error) throw new Error(data.details || data.error);
          const text = data.content?.[0]?.text || "";
          const clean = text.replace(/```json|```/g, "").trim();
          const parsed = JSON.parse(clean);
          setBilan(parsed);
          setStep("result");
        } catch (err) {
          console.error(err);
          setBilan({ error: true, errorMsg: err.message });
          setStep("result");
        }
      };

      const restart = () => go(() => {
        setStep("intro"); setCurrent(0);
        setAnswers(Array(questions.length).fill(null));
        setBilan(null); setArchetype(null); setLoadingMsg(0);
      });

      const handleShare = async (platform) => {
        const url = window.location.href;
        const text = `Je viens de découvrir mon archétype : « ${archetype?.nom} ». Découvre le tien :`;
        if (platform === "whatsapp") {
          window.open(`https://wa.me/?text=${encodeURIComponent(text + " " + url)}`, "_blank");
        } else if (platform === "copy") {
          await navigator.clipboard.writeText(text + " " + url);
          setShareCopied(true);
          setTimeout(() => setShareCopied(false), 2000);
        } else if (platform === "instagram") {
          await navigator.clipboard.writeText(text + " " + url);
          setShareCopied(true);
          setTimeout(() => setShareCopied(false), 2000);
          alert("Lien copié ! Colle-le dans ta story Instagram");
        }
      };

      // CTA dynamique selon la température
      const getDynamicCTA = () => {
        const temp = bilan?.seller_notes?.temperature?.toLowerCase();
        if (temp === "chaud") {
          return {
            label: "Rejoindre Code Liberté maintenant →",
            url: "https://brilleetvibre.com",
            sub: "Pour les femmes prêtes à passer à l'action",
          };
        }
        if (temp === "tiede" || temp === "tiède") {
          return {
            label: "Réserver un appel découverte gratuit →",
            url: "https://brilleetvibre.com",
            sub: "15 minutes, sans engagement, pour valider que c'est fait pour toi",
          };
        }
        return {
          label: "Découvrir Code Liberté à mon rythme →",
          url: "https://brilleetvibre.com",
          sub: "Lis les témoignages de femmes qui ont douté avant toi",
        };
      };

      return (
        <div style={S.root}>
          <style>{CSS}</style>

          {/* ─── INTRO ─── */}
          {step === "intro" && (
            <div className={`pg ${leaving ? "lv" : "en"}`}>
              <div style={S.wrap}>
                <p style={S.kicker}>BILAN DE VIE · CODE LIBERTÉ</p>
                <h1 style={S.h1}>Quelle femme<br/><em style={S.em}>es-tu vraiment&nbsp;?</em></h1>
                <div style={S.heroLine}/>
                <p style={S.lead}>
                  15 questions. 2 minutes. Aucun texte à écrire.
                  <br/><br/>
                  À la fin, tu découvres <strong>ton archétype</strong> parmi six profils — et un diagnostic ultra personnalisé qui révèle ce que tu n'as jamais osé te dire à toi-même.
                </p>

                <div style={S.archetypeGrid}>
                  {Object.values(ARCHETYPES).map(a => (
                    <div key={a.id} style={{...S.archetypeMini, background: a.accent}}>
                      <span style={{...S.archetypeMiniName, color: a.color}}>{a.nom}</span>
                    </div>
                  ))}
                </div>

                <button className="btn-main" onClick={() => go(() => setStep("quiz"))}>
                  Découvrir mon archétype →
                </button>
                <p style={S.smallNote}>Diagnostic généré par IA · 100% personnalisé · Confidentiel</p>
              </div>
            </div>
          )}

          {/* ─── QUIZ ─── */}
          {step === "quiz" && (
            <div className={`pg ${leaving ? "lv" : "en"}`}>

                    return (
                      <button
                        key={i}

                          ...S.optBtn,

                ) : (

                    {/* Hero archétype */}
                    <div style={{...S.archHero, background: archetype.accent}}>

                    </div>

                    </div>

                    {/* Pattern invisible */}
