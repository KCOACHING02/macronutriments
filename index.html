<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilan de vie - Code Liberté</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    // ── SECTION 1: QUESTIONS ──
    const questions = [
      {
        id: 1, bloc: "vision", emoji: "🌍", label: "Ta destination",
        text: "Si l'argent n'était plus un problème, où vivrais-tu et comment ressembleraient tes journées ?",
        placeholder: "Ex : Je me réveillerais à Bali face à la mer, sans alarme, je prendrais mon café en regardant le soleil se lever…",
        hint: "Sois précis(e) — le lieu, l'ambiance, les détails qui te font vibrer",
        minLength: 30,
      },
      {
        id: 2, bloc: "vision", emoji: "⏰", label: "Ta journée idéale",
        text: "Décris ta journée parfaite — du réveil au coucher. Sans contraintes, sans patron, sans agenda imposé.",
        placeholder: "Ex : Je me lève quand j'en ai envie, je travaille 3h sur mes projets depuis un café, je passe l'après-midi avec mes enfants…",
        hint: "Le plus concret possible — les heures, les activités, les ressentis",
        minLength: 30,
      },
      {
        id: 3, bloc: "vision", emoji: "❤️", label: "Ce qui compte vraiment",
        text: "Pour qui ou pour quoi tu veux vraiment réussir ? Qu'est-ce que cette réussite changerait pour eux ?",
        placeholder: "Ex : Pour mes enfants — je veux qu'ils voient que c'est possible. Pour ma mère que j'aimerais sortir de ses galères…",
        hint: "La vraie raison derrière l'ambition",
        minLength: 20,
      },
      {
        id: 4, bloc: "vision", emoji: "🏆", label: "Ta définition du succès",
        text: "Dans 3 ans, si tout s'est passé exactement comme tu le voulais, tu te retrouves où ? Qu'est-ce qui a changé ?",
        placeholder: "Ex : J'ai quitté mon CDI, je gagne 5 000€/mois depuis mon laptop, je voyage 4 mois par an…",
        hint: "Sois ambitieux(se) — c'est ton film, pas celui des autres",
        minLength: 30,
      },
      {
        id: 5, bloc: "present", emoji: "😤", label: "Ta réalité aujourd'hui",
        text: "Décris ta vie actuelle honnêtement. Ce que tu fais, ce que tu ressens, ce qui te pèse le plus.",
        placeholder: "Ex : Je me lève à 6h30 pour un boulot qui me rapporte 2 200€/mois, je rentre épuisé(e), il ne me reste plus rien pour moi…",
        hint: "Pas besoin de mettre les formes — dis-le comme tu le ressens",
        minLength: 30,
      },
      {
        id: 6, bloc: "present", emoji: "📱", label: "Ton rapport au digital",
        text: "Tu passes combien de temps sur ton téléphone par jour ? Tu fais quoi avec ce temps ?",
        placeholder: "Ex : Facilement 3h, surtout TikTok et Instagram. Je regarde des gens voyager ou parler de leurs revenus en ligne…",
        hint: "Sois honnête — cette réponse va compter dans ton bilan",
        minLength: 15,
      },
      {
        id: 7, bloc: "present", emoji: "💸", label: "Ta situation financière",
        text: "Ta situation financière aujourd'hui — revenus, dépenses, ce qu'il te manque pour vivre la vie que tu veux.",
        placeholder: "Ex : Je gagne 2 500€, il m'en faudrait le double pour être tranquille. J'ai des dettes/des économies de…",
        hint: "Pas de jugement — c'est pour calibrer ce dont tu as besoin",
        minLength: 20,
      },
      {
        id: 8, bloc: "blocages", emoji: "🧱", label: "Ce qui t'a arrêté(e)",
        text: "T'as déjà essayé de changer ta situation ? Qu'est-ce qui s'est passé ? Qu'est-ce qui t'a bloqué(e) ?",
        placeholder: "Ex : J'ai essayé le dropshipping, j'ai perdu 300€. J'ai acheté une formation que je n'ai jamais terminée. J'ai peur de…",
        hint: "Les tentatives passées sont de l'or — pas des échecs",
        minLength: 20,
      },
      {
        id: 9, bloc: "blocages", emoji: "😰", label: "Ta plus grande peur",
        text: "Si tu devais nommer ta plus grande peur par rapport au business en ligne, ce serait quoi ?",
        placeholder: "Ex : Que ça ne marche pas et que j'aie perdu mon argent. Que mon entourage se moque. Que je ne sois pas assez…",
        hint: "La vraie peur, pas la version présentable",
        minLength: 15,
      },
      {
        id: 10, bloc: "blocages", emoji: "⚡", label: "Ce qui changerait tout",
        text: "Qu'est-ce qui te ferait passer à l'action cette semaine si tu l'avais ? Qu'est-ce qu'il te manque vraiment ?",
        placeholder: "Ex : Une méthode prouvée. Quelqu'un qui m'accompagne. La certitude que ça va marcher. Un mentor qui…",
        hint: "Le déclic qu'il te faut",
        minLength: 15,
      },
    ];

    // ── SECTION 2: SYSTEM PROMPT IA ──
    function buildPrompt(answers) {
      const formatted = answers.map((a, i) => {
        const q = questions[i];
        return `[${q.emoji} ${q.label}]\nQuestion : ${q.text}\nRéponse : ${a}`;
      }).join("\n\n");

      return `Tu es un expert en psychologie de la motivation et en business en ligne. Tu analyses les réponses d'une personne à un questionnaire de vision de vie pour lui produire un bilan personnalisé percutant.

RÉPONSES DE LA PERSONNE :
${formatted}

INSTRUCTIONS POUR LE BILAN :
Tu dois produire un bilan JSON avec exactement cette structure. Réponds UNIQUEMENT avec le JSON, rien d'autre.

{
  "prenom_suppose": "Prénom supposé ou 'toi' si impossible à deviner",
  "vision_titre": "Un titre court et percutant qui résume SA vision de vie en 8 mots max — utilise SES propres mots",
  "vision_portrait": "2-3 phrases qui décrivent sa vie rêvée avec SES propres mots exacts. Commence par 'Tu veux…' et sois ultra précis(e) avec ce qu'il/elle a écrit. Effet miroir total.",
  "ecart_brutal": "1-2 phrases qui nomment l'écart entre sa vie actuelle et sa vision. Direct, sans filtre. Pas de jugement mais pas de complaisance. Utilise ses chiffres et sa situation réelle.",
  "contradiction": "Si il/elle passe du temps sur son téléphone mais dit manquer de temps — nomme cette contradiction directement. Sinon laisse vide.",
  "force_cachee": "Ce que ses réponses révèlent sur ses forces réelles qu'il/elle ne voit pas. Basé sur ce qu'il/elle a écrit — pas des généralités.",
  "peur_nommee": "Reformule sa peur principale avec ses propres mots. Puis montre que cette peur est logique et compréhensible — sans la minimiser.",
  "blocage_principal": "Son blocage numéro 1 identifié à travers ses réponses. 1 phrase précise.",
  "question_cle": "UNE question qui le/la fait réfléchir sur ce qui le/la sépare vraiment de sa vie rêvée. Pas rhétorique — une vraie question inconfortable.",
  "verdict": "oui | bientot | non",
  "verdict_raison": "2-3 phrases qui expliquent pourquoi Code Liberté est OU n'est pas le bon véhicule pour atteindre SA vision spécifique. Utilise ses exemples concrets.",
  "code_liberte_lien": "Comment Code Liberté lui permet d'atteindre SA vision spécifique — pas une description générique de la formation. Connecte les points entre ce qu'il/elle veut et ce que Code Liberté offre concrètement.",
  "premier_pas": "Le premier pas concret qu'il/elle peut faire AUJOURD'HUI — spécifique à sa situation.",
  "phrase_miroir": "LA phrase qui va le/la retourner — qui résume tout en une ligne. Utilise ses propres mots. C'est la phrase qu'il/elle va screenshotter.",
  "seller_notes": {
    "temperature": "froid | tiede | chaud",
    "blocage_dominant": "arnaque | methode | budget | regard | discipline | confiance",
    "urgence": "faible | moyenne | forte",
    "action_recommandee": "description courte de l'action à faire",
    "ton_a_adopter": "description du ton"
  }
}`;
    }

    // ── SECTION 3: BLOCS CONFIG + VERDICT CONFIG ──
    const BLOCS = [
      { id: "vision", label: "Ta vision", emoji: "🌟", color: "#E8452A", qs: [1,2,3,4] },
      { id: "present", label: "Ton présent", emoji: "📍", color: "#1A6B8A", qs: [5,6,7] },
      { id: "blocages", label: "Tes blocages", emoji: "🧱", color: "#9333EA", qs: [8,9,10] },
    ];

    const VERDICT_CONFIG = {
      oui: { emoji: "🚀", color: "#1B6B4A", badge: "✅ Code Liberté est ton véhicule", cta: "Rejoindre Code Liberté maintenant →", urgency: "🔥 Places limitées — tarif de lancement" },
      bientot: { emoji: "🔧", color: "#C05A1F", badge: "⚠️ Presque prêt(e)", cta: "Rejoindre la liste d'attente →", urgency: "Accompagnement gratuit en attendant" },
      non: { emoji: "🧭", color: "#7B6E5E", badge: "🧭 Pas encore le bon moment", cta: null, urgency: null },
    };

    // ── SECTION 4: APP COMPONENT ──
    function App() {
      const [step, setStep] = useState("intro");
      const [current, setCurrent] = useState(0);
      const [answers, setAnswers] = useState(Array(questions.length).fill(""));
      const [bilan, setBilan] = useState(null);
      const [leaving, setLeaving] = useState(false);
      const [loadingMsg, setLoadingMsg] = useState(0);
      const textareaRef = useRef(null);

      const q = questions[current];
      const currentBloc = BLOCS.find(b => b.qs.includes(q?.id));
      const progress = (current / questions.length) * 100;
      const currentAnswer = answers[current] || "";
      const canContinue = currentAnswer.trim().length >= (q?.minLength || 15);

      const LOADING_MSGS = [
        "Analyse de ta vision de vie…",
        "Identification de tes blocages réels…",
        "Calcul de l'écart entre ton présent et ta destination…",
        "Construction de ton bilan personnalisé…",
        "Finalisation de ton portrait…",
      ];

      useEffect(() => {
        if (step === "loading") {
          const interval = setInterval(() => {
            setLoadingMsg(prev => (prev + 1) % LOADING_MSGS.length);
          }, 1800);
          return () => clearInterval(interval);
        }
      }, [step]);

      useEffect(() => {
        if (textareaRef.current) textareaRef.current.focus();
      }, [current]);

      const go = (fn) => { setLeaving(true); setTimeout(() => { fn(); setLeaving(false); }, 280); };

      const handleAnswer = (val) => {
        const newAnswers = [...answers];
        newAnswers[current] = val;
        setAnswers(newAnswers);
      };

      const handleNext = () => {
        if (!canContinue) return;
        go(() => {
          if (current + 1 < questions.length) {
            setCurrent(current + 1);
          } else {
            generateBilan();
          }
        });
      };

      const handleKeyDown = (e) => {
        if (e.key === "Enter" && e.metaKey && canContinue) handleNext();
      };

      const generateBilan = async () => {
        setStep("loading");
        try {
          const prompt = buildPrompt(answers);
          const response = await fetch("/api/bilan", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              system: "Tu es un expert en psychologie de la motivation et en business en ligne. Tu réponds UNIQUEMENT en JSON valide, sans markdown, sans backticks, sans aucun texte avant ou après le JSON.",
              messages: [{ role: "user", content: prompt }],
            }),
          });
          const data = await response.json();
          if (data.error) throw new Error(data.details || data.error);
          const text = data.content?.[0]?.text || "";
          const clean = text.replace(/```json|```/g, "").trim();
          const parsed = JSON.parse(clean);
          setBilan(parsed);
          setStep("result");
        } catch (err) {
          console.error(err);
          setBilan({ error: true, errorMsg: err.message });
          setStep("result");
        }
      };

      const restart = () => go(() => {
        setStep("intro"); setCurrent(0);
        setAnswers(Array(questions.length).fill(""));
        setBilan(null); setLoadingMsg(0);
      });

      const verdict = bilan?.verdict ? VERDICT_CONFIG[bilan.verdict] : null;

      return (
        <div style={S.root}>
          <style>{CSS}</style>

          {/* INTRO */}
          {step === "intro" && (
            <div className={`pg ${leaving ? "lv" : "en"}`}>
              <div style={S.wrap}>
                <div style={S.brandRow}><span style={S.dot}/><span style={S.brand}>Code Liberté</span></div>
                <div style={S.introHero}>
                  <p style={S.kicker}>Bilan de vie · 10 questions · 5 min</p>
                  <h1 style={S.h1}>Quelle vie<br /><span style={S.accent}>veux-tu vraiment ?</span></h1>
                  <p style={S.desc}>
                    Ce questionnaire n'est pas sur Code Liberté. Il est sur <strong style={{color:"#fff"}}>toi</strong> — ta vision, ton présent, tes blocages. À la fin, tu reçois un bilan personnalisé généré par IA qui analyse tes réponses et te dit exactement ce qu'il te faut pour atteindre la vie que tu veux.
                  </p>
                </div>
                <div style={S.blocsRow}>
                  {BLOCS.map(b => (
                    <div key={b.id} style={{ ...S.blocCard, borderColor: b.color + "35", background: b.color + "08" }}>
                      <span style={S.blocEmoji}>{b.emoji}</span>
                      <span style={{ ...S.blocLabel, color: b.color }}>{b.label}</span>
                    </div>
                  ))}
                </div>
                <div style={S.warningBox}>
                  <span style={S.warningIcon}>✍️</span>
                  <p style={S.warningTxt}>Ce questionnaire utilise des champs libres — pas des cases à cocher. Plus tu es précis(e), plus ton bilan sera percutant.</p>
                </div>
                <button className="btn-main" onClick={() => go(() => setStep("quiz"))}>
                  Commencer mon bilan →
                </button>
                <p style={S.social}>Bilan généré par IA · 100% personnalisé · Gratuit</p>
              </div>
            </div>
          )}

          {/* QUIZ */}
          {step === "quiz" && (
            <div className={`pg ${leaving ? "lv" : "en"}`}>
              <div style={S.wrap}>
                <div style={S.quizTop}>
                  <span style={S.brandSm}>Code Liberté</span>
                  <span style={S.qNum}>{current + 1}<span style={S.qOf}>/10</span></span>
                </div>
                <div style={S.track}>
                  <div style={{ ...S.fill, width: `${progress}%`, background: currentBloc?.color }} />
                </div>
                <div style={{ ...S.blocTag, color: currentBloc?.color, borderColor: currentBloc?.color + "40", background: currentBloc?.color + "10" }}>
                  {currentBloc?.emoji} {currentBloc?.label}
                </div>
                <div style={S.qBlock}>
                  <span style={S.qEmoji}>{q.emoji}</span>
                  <h2 style={S.qText}>{q.text}</h2>
                  {q.hint && <p style={{ ...S.qHint, color: currentBloc?.color + "cc" }}>{q.hint}</p>}
                </div>
                <div style={S.textareaWrap}>
                  <textarea
                    ref={textareaRef}
                    style={S.textarea}
                    value={currentAnswer}
                    onChange={e => handleAnswer(e.target.value)}
                    onKeyDown={handleKeyDown}
                    placeholder={q.placeholder}
                    rows={5}
                  />
                  <div style={S.textareaFooter}>
                    <span style={{ ...S.charCount, color: canContinue ? currentBloc?.color : "rgba(255,255,255,0.2)" }}>
                      {currentAnswer.length} caractères {canContinue ? "✓" : `(min ${q.minLength})`}
                    </span>
                    <span style={S.cmdHint}>⌘ + Entrée pour continuer</span>
                  </div>
                </div>
                <button
                  className="btn-main"
                  style={{ opacity: canContinue ? 1 : 0.2, pointerEvents: canContinue ? "auto" : "none", background: currentBloc?.color }}
                  onClick={handleNext}
                >
                  {current === questions.length - 1 ? "Générer mon bilan →" : "Continuer →"}
                </button>
                {current > 0 && (
                  <button className="btn-back" onClick={() => go(() => setCurrent(current - 1))}>
                    ← Question précédente
                  </button>
                )}
              </div>
            </div>
          )}

          {/* LOADING */}
          {step === "loading" && (
            <div className="pg en" style={{ alignItems: "center", minHeight: "100vh" }}>
              <div style={S.loadingWrap}>
                <div style={S.loadingOrb} />
                <div style={S.loadingSpinner}>
                  <div className="spinner" />
                </div>
                <h2 style={S.loadingTitle}>Analyse en cours...</h2>
                <p style={S.loadingMsg}>{LOADING_MSGS[loadingMsg]}</p>
                <p style={S.loadingNote}>L'IA analyse tes 10 réponses pour construire ton bilan unique</p>
              </div>
            </div>
          )}

          {/* RESULT */}
          {step === "result" && bilan && (
            <div className={`pg ${leaving ? "lv" : "en"}`}>
              <div style={S.wrap}>
                {bilan.error ? (
                  <div style={S.errorBox}>
                    <p style={S.errorTxt}>Une erreur s'est produite lors de la génération. Réessaie dans quelques instants.</p>
                    {bilan.errorMsg && <p style={{fontSize:12,color:"rgba(255,255,255,0.4)",marginTop:8,wordBreak:"break-all"}}>Détail : {bilan.errorMsg}</p>}
                    <button className="btn-main" style={{ background: "#E8452A", marginTop: 16 }} onClick={restart}>Recommencer</button>
                  </div>
                ) : (
                  <>
                    {verdict && (
                      <div style={{ ...S.verdictBadge, color: verdict.color, borderColor: verdict.color + "50", background: verdict.color + "12" }}>
                        {verdict.badge}
                      </div>
                    )}
                    <div style={S.resultHero}>
                      <span style={S.resultEmoji}>{verdict?.emoji || "🌟"}</span>
                      <h2 style={S.resultH2}>"{bilan.vision_titre}"</h2>
                      <div style={{ ...S.heroLine, background: verdict?.color || "#E8452A" }} />
                    </div>
                    <div style={S.mirrorBox}>
                      <p style={S.mirrorLabel}>CE QUE TES RÉPONSES RÉVÈLENT</p>
                      <p style={S.mirrorTxt}>{bilan.vision_portrait}</p>
                    </div>
                    <div style={S.ecartBox}>
                      <span style={S.ecartIcon}>📍</span>
                      <div>
                        <p style={S.ecartLabel}>L'ÉCART AUJOURD'HUI</p>
                        <p style={S.ecartTxt}>{bilan.ecart_brutal}</p>
                      </div>
                    </div>
                    {bilan.contradiction && (
                      <div style={S.contraBox}>
                        <span style={S.contraIcon}>⚡</span>
                        <p style={S.contraTxt}>{bilan.contradiction}</p>
                      </div>
                    )}
                    <div style={S.forceBox}>
                      <p style={S.forceLabel}>💪 TA FORCE CACHÉE</p>
                      <p style={S.forceTxt}>{bilan.force_cachee}</p>
                    </div>
                    <div style={S.peurBox}>
                      <p style={S.peurLabel}>😰 TA PEUR PRINCIPALE</p>
                      <p style={S.peurTxt}>{bilan.peur_nommee}</p>
                    </div>
                    <div style={S.blocageBox}>
                      <span style={S.blocageDot} />
                      <p style={S.blocageTxt}><strong>Blocage n°1 :</strong> {bilan.blocage_principal}</p>
                    </div>
                    <div style={S.questionBox}>
                      <p style={S.questionLabel}>LA QUESTION QUI CHANGE TOUT</p>
                      <p style={S.questionTxt}>"{bilan.question_cle}"</p>
                    </div>
                    <div style={{ ...S.verdictBox, borderColor: verdict?.color + "40", background: verdict?.color + "08" }}>
                      <p style={{ ...S.verdictLabel, color: verdict?.color }}>POURQUOI CODE LIBERTÉ</p>
                      <p style={S.verdictTxt}>{bilan.verdict_raison}</p>
                      {bilan.code_liberte_lien && (
                        <p style={{ ...S.clLienTxt, borderTop: "1px solid " + (verdict?.color + "30"), paddingTop: 12, marginTop: 12 }}>
                          {bilan.code_liberte_lien}
                        </p>
                      )}
                    </div>
                    <div style={S.pasBox}>
                      <p style={S.pasLabel}>🎯 TON PREMIER PAS AUJOURD'HUI</p>
                      <p style={S.pasTxt}>{bilan.premier_pas}</p>
                    </div>
                    <div style={S.phraseBox}>
                      <p style={S.phraseTxt}>"{bilan.phrase_miroir}"</p>
                      <p style={S.phraseCredit}>— Ton bilan Code Liberté</p>
                    </div>
                    {verdict?.urgency && (
                      <div style={S.urgBox}>
                        <span style={S.urgDot} />
                        <span style={S.urgTxt}>{verdict.urgency}</span>
                      </div>
                    )}
                    {verdict?.cta && (
                      <button
                        className="btn-cta"
                        style={{ background: verdict.color }}
                        onClick={() => alert("Redirection → " + verdict.cta)}
                      >
                        {verdict.cta}
                      </button>
                    )}
                    {bilan.seller_notes && (
                      <details style={S.seller}>
                        <summary style={S.sellerSum}>📊 Données vendeur (privé)</summary>
                        <div style={S.sellerBody}>
                          {[
                            ["Température", bilan.seller_notes.temperature],
                            ["Blocage dominant", bilan.seller_notes.blocage_dominant],
                            ["Urgence", bilan.seller_notes.urgence],
                            ["Action recommandée", bilan.seller_notes.action_recommandee],
                            ["Ton à adopter", bilan.seller_notes.ton_a_adopter],
                          ].map(([k, v]) => (
                            <div key={k} style={S.sellerRow}>
                              <span style={S.sellerKey}>{k}</span>
                              <span style={{ ...S.sellerVal, color: verdict?.color }}>{v}</span>
                            </div>
                          ))}
                        </div>
                      </details>
                    )}
                    <button className="btn-ghost" onClick={restart}>Refaire le bilan</button>
                    <p style={S.footer}>Code Liberté · Brille & Vibre</p>
                  </>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ── SECTION 5: STYLES (S object) ──
    const S = {
      root: { minHeight: "100vh", background: "#0b0908", display: "flex", justifyContent: "center", padding: "0 16px 80px", fontFamily: "'Outfit',sans-serif" },
      wrap: { width: "100%", maxWidth: 520, paddingTop: 40, display: "flex", flexDirection: "column", gap: 18 },
      brandRow: { display: "flex", alignItems: "center", gap: 9 },
      dot: { width: 8, height: 8, borderRadius: "50%", background: "#E8452A", flexShrink: 0 },
      brand: { fontSize: 14, fontWeight: 800, color: "#fff", letterSpacing: "0.08em", textTransform: "uppercase" },
      brandSm: { fontSize: 11, fontWeight: 700, color: "rgba(255,255,255,0.3)", letterSpacing: "0.08em", textTransform: "uppercase" },
      introHero: { display: "flex", flexDirection: "column", gap: 12 },
      kicker: { fontSize: 11, color: "#E8452A", letterSpacing: "0.18em", textTransform: "uppercase", fontWeight: 700 },
      h1: { fontSize: 34, fontWeight: 800, color: "#fff", lineHeight: 1.18, letterSpacing: "-0.02em" },
      accent: { color: "#E8452A" },
      desc: { fontSize: 15, color: "rgba(255,255,255,0.5)", lineHeight: 1.72 },
      blocsRow: { display: "flex", gap: 8 },
      blocCard: { flex: 1, border: "1px solid", borderRadius: 12, padding: "12px 10px", display: "flex", flexDirection: "column", alignItems: "center", gap: 6 },
      blocEmoji: { fontSize: 22 },
