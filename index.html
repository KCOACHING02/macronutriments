    // ── SECTION 3: SCORING LOGIC ──
    function computeScores(answers) {
      // answers = [optionIndex, optionIndex, ...] (un index par question)
      const scores = {
        ambition: 0, urgence: 0, douleur: 0, discipline: 0, confiance: 0,
        vision: 0, action: 0, scepticisme: 0, ent_toxique: 0, arg_peur: 0,
        bloc_methode: 0, bloc_argent: 0, bloc_entourage: 0, bloc_confiance: 0,
        bloc_discipline: 0, valeur_famille: 0, valeur_liberte: 0, valeur_creation: 0,
        force_resilience: 0, force_creativite: 0, force_empathie: 0, force_apprentissage: 0,
      };

      answers.forEach((optIdx, qIdx) => {
        const opt = questions[qIdx]?.options[optIdx];
        if (!opt) return;
        Object.entries(opt.s || {}).forEach(([key, val]) => {
          scores[key] = (scores[key] || 0) + val;
        });
      });

      return scores;
    }

    function detectArchetype(scores) {
      // On calcule un "match score" pour chaque archétype
      const matches = {
        reveur_piege:
          scores.ambition * 2 + scores.urgence * 2 + scores.douleur -
          scores.action - scores.discipline,
        sceptique_brule:
          scores.scepticisme * 3 + scores.bloc_confiance * 2 -
          scores.confiance + scores.arg_peur,
        prete_a_partir:
          scores.action * 2 + scores.vision * 2 + scores.discipline +
          scores.confiance - scores.scepticisme,
        perdue_confortable:
          -scores.urgence * 2 - scores.vision + scores.douleur * 0.5 -
          scores.ambition,
        prisonniere_sociale:
          scores.ent_toxique * 3 + scores.bloc_entourage * 2 +
          scores.ambition - scores.confiance,
        hyperactive_dispersee:
          scores.bloc_discipline * 2 - scores.discipline +
          scores.force_creativite + Math.max(0, scores.action),
      };

      // L'archétype gagnant
      const winner = Object.entries(matches).reduce((best, [id, score]) =>
        score > best.score ? { id, score } : best
      , { id: "perdue_confortable", score: -Infinity });

      return { archetype: winner.id, matches, scores };
    }

    // Trouve le blocage dominant (pour les seller_notes)
    function dominantBlocage(scores) {
      const blocs = {
        methode: scores.bloc_methode,
        argent: scores.bloc_argent,
        entourage: scores.bloc_entourage,
        confiance: scores.bloc_confiance,
        discipline: scores.bloc_discipline,
      };
      return Object.entries(blocs).reduce((best, [k, v]) =>
        v > best.v ? { k, v } : best
      , { k: "methode", v: -Infinity }).k;
    }

    // ── SECTION 4: SYSTEM PROMPT IA ──
    function buildPrompt(answers, archetype, scores) {
      const arch = ARCHETYPES[archetype];
      const blocageDom = dominantBlocage(scores);

      // Format des réponses choisies
      const formatted = answers.map((optIdx, qIdx) => {
        const q = questions[qIdx];
        const opt = q.options[optIdx];
        return `Q${qIdx + 1} : ${q.text}\n→ ${opt.label}`;
      }).join("\n\n");

      // Top 5 dimensions (les plus saillantes)
      const topDims = Object.entries(scores)
        .filter(([k, v]) => v !== 0)
        .sort((a, b) => Math.abs(b[1]) - Math.abs(a[1]))
        .slice(0, 8)
        .map(([k, v]) => `${k}: ${v > 0 ? "+" : ""}${v}`)
        .join(", ");

      return `Tu es un coach expert en psychologie comportementale et reconversion professionnelle. Tu produis un bilan ULTRA personnalisé et diagnostique pour une femme qui vient de répondre à 15 questions à choix multiples.

IMPORTANT : N'UTILISE AUCUN EMOJI dans ta réponse JSON. Uniquement du texte pur.

ARCHÉTYPE DÉTECTÉ : ${arch.nom}
TAGLINE OFFICIELLE : ${arch.tagline}
DESCRIPTION DU PROFIL : ${arch.description}

DIMENSIONS PSYCHOLOGIQUES MESURÉES :
${topDims}

BLOCAGE DOMINANT : ${blocageDom}

RÉPONSES CHOISIES :
${formatted}

═══════════════════════════════════════
INSTRUCTIONS CRITIQUES POUR TON BILAN :
═══════════════════════════════════════

1. NE REFORMULE PAS ses réponses. Elle sait déjà ce qu'elle a coché.
2. RÉVÈLE des choses qu'elle n'a JAMAIS formulées sur elle-même.
3. NOMME le pattern inconscient qu'elle répète sans le voir.
4. SOIS direct, presque brutal — comme une amie ultra-lucide qui dit la vérité.
5. UTILISE le "tu" — chaud, intime, jamais condescendant.
6. PAS de jargon coach mou ("tu mérites tellement", "tu as un potentiel énorme"). PARLE VRAI.
7. Chaque phrase doit être SPÉCIFIQUE à son archétype, pas générique.

Réponds UNIQUEMENT avec ce JSON, rien d'autre :

{
  "portrait_brutal": "3-4 phrases qui dressent SON portrait psychologique. Commence par une affirmation qui la fige. Nomme ce que personne n'a osé lui dire. Sois précis avec son archétype ${arch.nom}.",
  "pattern_invisible": "1 phrase qui décrit le pattern qu'elle répète inconsciemment. Format : 'Tu fais X parce que tu crois que Y, mais en vérité Z.' Doit être troublant de précision.",
  "fausse_croyance": "1 phrase qui nomme la fausse croyance qui la bloque. Une phrase qu'elle n'a jamais formulée mais qui dirige sa vie. Format : 'Tu crois que [croyance], et c'est ce qui te bloque.'",
  "declic_specifique": "2-3 phrases qui décrivent LE déclic dont elle a besoin — adapté à SON archétype ${arch.nom}. Pas un conseil générique. Une révélation.",
  "premier_pas": "1-2 phrases : LE premier pas concret qu'elle peut faire CETTE SEMAINE. Adapté à son archétype et son blocage dominant (${blocageDom}). Doit être minuscule mais symbolique.",

    // ── SECTION 5: APP COMPONENT ──
    function App() {
      const [step, setStep] = useState("intro"); // intro | quiz | loading | email | result
      const [current, setCurrent] = useState(0);
      const [answers, setAnswers] = useState(Array(questions.length).fill(null));
      const [bilan, setBilan] = useState(null);
      const [archetype, setArchetype] = useState(null);
      const [leaving, setLeaving] = useState(false);
      const [loadingMsg, setLoadingMsg] = useState(0);
      const [email, setEmail] = useState("");
      const [prenom, setPrenom] = useState("");
      const [emailSubmitting, setEmailSubmitting] = useState(false);
      const [shareCopied, setShareCopied] = useState(false);

      const q = questions[current];
      const progress = ((current) / questions.length) * 100;
      const currentAnswer = answers[current];
      const allAnswered = answers.every(a => a !== null);

      const LOADING_MSGS = [
        "Analyse de tes réponses…",
        "Identification de ton archétype…",
        "Détection de tes patterns invisibles…",
        "Construction de ton diagnostic…",
        "Rédaction de ton bilan personnalisé…",
      ];

      useEffect(() => {
        if (step === "loading") {
          const interval = setInterval(() => {
            setLoadingMsg(prev => (prev + 1) % LOADING_MSGS.length);
          }, 1700);
          return () => clearInterval(interval);
        }
      }, [step]);

      const go = (fn) => { setLeaving(true); setTimeout(() => { fn(); setLeaving(false); }, 280); };

      const handleSelect = (optIdx) => {
        const newAnswers = [...answers];
        newAnswers[current] = optIdx;
        setAnswers(newAnswers);

        // Auto-avance après 350ms
        setTimeout(() => {
          go(() => {
            if (current + 1 < questions.length) {
              setCurrent(current + 1);
            } else {
              generateBilan(newAnswers);
            }
          });
        }, 350);
      };

      const handleBack = () => {
        if (current > 0) go(() => setCurrent(current - 1));
      };

      const generateBilan = async (finalAnswers) => {
        setStep("loading");
        try {
          const scores = computeScores(finalAnswers);
          const detection = detectArchetype(scores);
          const archId = detection.archetype;
          setArchetype(ARCHETYPES[archId]);

          const prompt = buildPrompt(finalAnswers, archId, scores);
          const response = await fetch("/api/bilan", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              system: "Tu es un coach expert en psychologie comportementale. Tu réponds UNIQUEMENT en JSON valide, sans markdown, sans backticks, sans aucun texte avant ou après le JSON.",
              messages: [{ role: "user", content: prompt }],
            }),
          });
          const data = await response.json();
          if (data.error) throw new Error(data.details || data.error);
          const text = data.content?.[0]?.text || "";
          const clean = text.replace(/```json|```/g, "").trim();
          const parsed = JSON.parse(clean);
          setBilan(parsed);
          setStep("email"); // → étape capture email avant le bilan complet
        } catch (err) {
          console.error(err);
          setBilan({ error: true, errorMsg: err.message });
          setStep("result");
        }
      };

      const submitEmail = async (e) => {
        e.preventDefault();
        if (!email.includes("@")) return;
        setEmailSubmitting(true);
        try {
          await fetch("/api/lead", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              email,
              prenom,
              archetype: archetype?.nom,
              temperature: bilan?.seller_notes?.temperature,
              blocage_dominant: bilan?.seller_notes?.blocage_dominant,
            }),
          });
        } catch (err) {

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      .loadingOrb {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, #D67B5C, #C04E2C);
        box-shadow: 0 0 40px rgba(192, 78, 44, 0.4);
        animation: pulse 1.8s ease-in-out infinite;
      }

      .opt-btn:hover {
        border-color: #C04E2C !important;
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(192, 78, 44, 0.1);
      }
      .opt-btn:active {
        transform: translateY(0);
      }

      .btn-main {
        background: #C04E2C;
        color: #FFF;
        border: none;
        border-radius: 16px;
        padding: 18px 24px;
        font-family: 'Inter', sans-serif;
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 0.01em;
        cursor: pointer;
        width: 100%;
        transition: all 0.2s ease;
        margin-top: 8px;
        box-shadow: 0 6px 20px rgba(192, 78, 44, 0.25);
      }
      .btn-main:hover {
        background: #A8431F;
        transform: translateY(-2px);
        box-shadow: 0 10px 28px rgba(192, 78, 44, 0.35);
      }

      .btn-cta {
        color: #FFF;
        border: none;
        border-radius: 14px;
        padding: 16px 22px;
        font-family: 'Inter', sans-serif;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.01em;
        cursor: pointer;
        width: 100%;
        transition: all 0.2s ease;
      }
      .btn-cta:hover {
        opacity: 0.92;
        transform: translateY(-2px);
        box-shadow: 0 8px 22px rgba(0, 0, 0, 0.15);
      }

      .btn-back {
        background: transparent;
        border: none;
        color: #A89A90;
        font-family: 'Inter', sans-serif;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        padding: 10px 0;
        text-align: center;
        width: 100%;
        transition: color 0.18s;
      }
      .btn-back:hover { color: #C04E2C; }

      .btn-ghost {
        background: transparent;
        border: 1.5px solid #D9CABE;
        color: #A89A90;
        border-radius: 14px;
        padding: 14px 22px;
        font-family: 'Inter', sans-serif;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        width: 100%;
        transition: all 0.18s;
      }
      .btn-ghost:hover {
        border-color: #C04E2C;
        color: #C04E2C;
      }

      details[open] summary { color: #2D1F1A; }

      input:focus {
        border-color: #C04E2C !important;
        background: #FFF !important;
      }

      .share-btn {
        background: #FFF;
        border: 1.5px solid #F4D9CE;
        color: #C04E2C;
        border-radius: 12px;
        padding: 10px 18px;
        font-family: 'Inter', sans-serif;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.18s;
      }
      .share-btn:hover {
        background: #C04E2C;
        color: #FFF;
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(192,78,44,0.25);
      }
    `;

    // ── RENDER ──
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
