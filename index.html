    // ── SECTION 3: SCORING LOGIC ──
    function computeScores(answers) {
      // answers = [optionIndex, optionIndex, ...] (un index par question)
      const scores = {
        ambition: 0, urgence: 0, douleur: 0, discipline: 0, confiance: 0,
        vision: 0, action: 0, scepticisme: 0, ent_toxique: 0, arg_peur: 0,
        bloc_methode: 0, bloc_argent: 0, bloc_entourage: 0, bloc_confiance: 0,
        bloc_discipline: 0, valeur_famille: 0, valeur_liberte: 0, valeur_creation: 0,
        force_resilience: 0, force_creativite: 0, force_empathie: 0, force_apprentissage: 0,
      };

      answers.forEach((optIdx, qIdx) => {
        const opt = questions[qIdx]?.options[optIdx];
        if (!opt) return;
        Object.entries(opt.s || {}).forEach(([key, val]) => {
          scores[key] = (scores[key] || 0) + val;
        });
      });

      return scores;
    }

    function detectArchetype(scores) {
      // On calcule un "match score" pour chaque archétype
      const matches = {
        reveur_piege:
          scores.ambition * 2 + scores.urgence * 2 + scores.douleur -
          scores.action - scores.discipline,
        sceptique_brule:
          scores.scepticisme * 3 + scores.bloc_confiance * 2 -
          scores.confiance + scores.arg_peur,
        prete_a_partir:
          scores.action * 2 + scores.vision * 2 + scores.discipline +
          scores.confiance - scores.scepticisme,
        perdue_confortable:
          -scores.urgence * 2 - scores.vision + scores.douleur * 0.5 -
          scores.ambition,
        prisonniere_sociale:
          scores.ent_toxique * 3 + scores.bloc_entourage * 2 +
          scores.ambition - scores.confiance,
        hyperactive_dispersee:
          scores.bloc_discipline * 2 - scores.discipline +
          scores.force_creativite + Math.max(0, scores.action),
      };

      // L'archétype gagnant
      const winner = Object.entries(matches).reduce((best, [id, score]) =>
        score > best.score ? { id, score } : best
      , { id: "perdue_confortable", score: -Infinity });

      return { archetype: winner.id, matches, scores };
    }

    // Trouve le blocage dominant (pour les seller_notes)
    function dominantBlocage(scores) {
      const blocs = {
        methode: scores.bloc_methode,
        argent: scores.bloc_argent,
        entourage: scores.bloc_entourage,
        confiance: scores.bloc_confiance,
        discipline: scores.bloc_discipline,
      };
      return Object.entries(blocs).reduce((best, [k, v]) =>
        v > best.v ? { k, v } : best
      , { k: "methode", v: -Infinity }).k;
    }

    // ── SECTION 4: SYSTEM PROMPT IA ──
    function buildPrompt(answers, archetype, scores) {

        return `Q${qIdx + 1} : ${q.text}\n→ ${opt.label}`;
      }).join("\n\n");

      // Top 5 dimensions (les plus saillantes)
      const topDims = Object.entries(scores)
        .filter(([k, v]) => v !== 0)
        .sort((a, b) => Math.abs(b[1]) - Math.abs(a[1]))
        .slice(0, 8)
        .map(([k, v]) => `${k}: ${v > 0 ? "+" : ""}${v}`)
        .join(", ");

      return `Tu es un coach expert en psychologie comportementale et reconversion professionnelle. Tu produis un bilan ULTRA personnalisé et diagnostique pour une femme qui vient de répondre à 15 questions à choix multiples.

        const newAnswers = [...answers];

        setTimeout(() => {
          go(() => {
            if (current + 1 < questions.length) {
              setCurrent(current + 1);
            } else {
              generateBilan(newAnswers);
            }
          });
        }, 350);
      };

      const handleBack = () => {
        if (current > 0) go(() => setCurrent(current - 1));
      };

        setStep("loading");
        try {
          const scores = computeScores(finalAnswers);
          const detection = detectArchetype(scores);
          const archId = detection.archetype;
          setArchetype(ARCHETYPES[archId]);

          const prompt = buildPrompt(finalAnswers, archId, scores);
          const response = await fetch("/api/bilan", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              system: "Tu es un coach expert en psychologie comportementale. Tu réponds UNIQUEMENT en JSON valide, sans markdown, sans backticks, sans aucun texte avant ou après le JSON.",
              messages: [{ role: "user", content: prompt }],
            }),
          });
          const data = await response.json();
          if (data.error) throw new Error(data.details || data.error);
          const text = data.content?.[0]?.text || "";
          const clean = text.replace(/```json|```/g, "").trim();
          const parsed = JSON.parse(clean);
          setBilan(parsed);
          setStep("result");
        } catch (err) {
          console.error(err);
          setBilan({ error: true, errorMsg: err.message });
          setStep("result");
        }

        background: transparent;
        border: none;
        color: #A89A90;
        font-family: 'Inter', sans-serif;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        padding: 10px 0;
        text-align: center;
        width: 100%;
        transition: color 0.18s;
      }
      .btn-back:hover { color: #C04E2C; }

      .btn-ghost {
        background: transparent;
        border: 1.5px solid #D9CABE;
        color: #A89A90;
        border-radius: 14px;
        padding: 14px 22px;
        font-family: 'Inter', sans-serif;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        width: 100%;
        transition: all 0.18s;
      }
      .btn-ghost:hover {
        border-color: #C04E2C;
        color: #C04E2C;
      }

      details[open] summary { color: #2D1F1A; }

      input:focus {
        border-color: #C04E2C !important;
        background: #FFF !important;
      }

      .share-btn {
        background: #FFF;
        border: 1.5px solid #F4D9CE;
        color: #C04E2C;
        border-radius: 12px;
        padding: 10px 18px;
        font-family: 'Inter', sans-serif;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.18s;
      }
      .share-btn:hover {
        background: #C04E2C;
        color: #FFF;
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(192,78,44,0.25);
      }
    `;

    // ── RENDER ──
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
