    // ── SECTION 1: QUESTIONS ──

        ],
      },
      {
        id: 3,
        text: "Ta plus grande peur en te lançant, c'est :",
        options: [
          { emoji: "💸", label: "Perdre l'argent que j'aurai mis dedans", s: { arg_peur: 4, bloc_argent: 3 } },
          { emoji: "👀", label: "Me planter devant tout le monde", s: { bloc_confiance: 3, ent_toxique: 2 } },
          { emoji: "⛓️", label: "Que ma vie ne change pas et rester coincée", s: { urgence: 4, douleur: 3 } },

        text: "Ton entourage proche, il est plutôt :",
        options: [
          { emoji: "💖", label: "Super soutenant, ils croient en moi", s: { ent_toxique: -3, confiance: 2 } },
          { emoji: "😐", label: "Neutre, ils me laissent faire", s: { ent_toxique: 0 } },
          { emoji: "🤨", label: "Sceptique mais pas méchant", s: { ent_toxique: 2, bloc_entourage: 2 } },
          { emoji: "🪨", label: "Plombant : critiques, moqueries…", s: { ent_toxique: 4, bloc_entourage: 4, douleur: 2 } },

        id: 6,

        options: [
          { emoji: "📚", label: "Une formation solide", s: { action: 2, vision: 2 } },
          { emoji: "🤝", label: "Un coach qui m'accompagne", s: { action: 2, bloc_methode: 2 } },
          { emoji: "🤔", label: "J'hésiterais des semaines", s: { action: -3, bloc_confiance: 2 } },
          { emoji: "🏦", label: "Je les garderais « au cas où »", s: { arg_peur: 4, action: -3 } },
        ],
      },
      {
        id: 7,
        text: "Ton rapport au temps aujourd'hui :",
        options: [
          { emoji: "🏃‍♀️", label: "Zéro temps, je suis débordée", s: { douleur: 3, urgence: 2 } },
          { emoji: "📱", label: "J'ai du temps mais je le gaspille", s: { discipline: -3, bloc_discipline: 3 } },
          { emoji: "⏰", label: "J'ai du temps et je suis prête", s: { action: 3 } },
          { emoji: "🪫", label: "Plus d'énergie, même quand j'ai le temps", s: { douleur: 4, confiance: -2 } },
        ],
      },
      {
        id: 8,
        text: "Quand tu imagines quitter ton boulot, tu ressens :",
        options: [
          { emoji: "🤩", label: "Une euphorie totale", s: { urgence: 4, ambition: 3 } },
          { emoji: "😰", label: "De l'excitation + une panique financière", s: { ambition: 2, arg_peur: 3 } },
          { emoji: "😣", label: "De la culpabilité, c'est stable", s: { bloc_confiance: 3, ent_toxique: 1 } },
          { emoji: "😶‍🌫️", label: "Ça me paraît impossible", s: { confiance: -4, bloc_confiance: 4 } },
        ],

      {

          { emoji: "⚡", label: "Je teste immédiatement", s: { action: 4, discipline: -1 } },
          { emoji: "💬", label: "J'en parle autour mais je ne fais rien", s: { action: -3, bloc_discipline: 2 } },
          { emoji: "📓", label: "Je note dans un coin et j'oublie", s: { action: -4, bloc_discipline: 3 } },
        ],
      },
      {
        id: 11,

        options: [
          { emoji: "🗺️", label: "Je ne sais pas par où commencer", s: { bloc_methode: 4 } },
          { emoji: "🛡️", label: "J'ai peur de me faire arnaquer", s: { bloc_confiance: 3, scepticisme: 3 } },
          { emoji: "💰", label: "Je n'ai pas les moyens financiers", s: { bloc_argent: 4, arg_peur: 2 } },

        ],
      },
      {
        id: 12,
        text: "Ta relation à l'argent :",
        options: [
          { emoji: "🤐", label: "C'est tabou chez moi", s: { arg_peur: 3 } },
          { emoji: "😔", label: "J'aimerais en avoir plus mais je culpabilise", s: { arg_peur: 2, bloc_confiance: 2 } },
          { emoji: "🛠️", label: "C'est un outil, je veux le maîtriser", s: { ambition: 2, action: 2 } },
          { emoji: "😵‍💫", label: "C'est devenu obsessionnel", s: { urgence: 3, douleur: 2 } },
        ],
      },
      {
        id: 13,
        text: "Quand tu te fixes un objectif, tu :",
        options: [
          { emoji: "📋", label: "Tu crées un plan détaillé", s: { discipline: 3, vision: 2 } },
          { emoji: "🚀", label: "Tu te lances et tu verras bien", s: { action: 3, discipline: -1 } },
          { emoji: "💭", label: "Tu en parles des mois avant d'agir", s: { action: -3 } },
          { emoji: "🤫", label: "Tu l'écris et tu le caches", s: { bloc_confiance: 3, ent_toxique: 2 } },
        ],
      },
      {
        id: 14,
        text: "Ta plus grande force que les autres ne voient pas :",
        options: [
          { emoji: "🪨", label: "Ma résilience, je ne lâche jamais", s: { force_resilience: 3, discipline: 1 } },
          { emoji: "💡", label: "Ma créativité, j'ai 1000 idées", s: { force_creativite: 3, discipline: -1 } },
          { emoji: "🫂", label: "Mon empathie, je comprends les gens", s: { force_empathie: 3 } },
          { emoji: "🧠", label: "Ma capacité à apprendre vite", s: { force_apprentissage: 3, action: 1 } },
        ],
      },
      {
        id: 15,
        text: "Si dans 1 an rien n'a changé dans ta vie, tu te sens comment ?",
        options: [
          { emoji: "😌", label: "Ça ira, je suis patiente", s: { urgence: -2 } },
          { emoji: "😤", label: "Frustrée mais je continuerai", s: { urgence: 2 } },
          { emoji: "💔", label: "Ça me détruira", s: { urgence: 4, douleur: 4 } },
          { emoji: "🏳️", label: "J'aurai déjà abandonné l'idée", s: { urgence: -3, confiance: -3 } },
        ],
      },
    ];

    // ── SECTION 2: ARCHÉTYPES ──
    const ARCHETYPES = {
      reveur_piege: {
        id: "reveur_piege",
        emoji: "🌪️",
        nom: "La Rêveuse Piégée",
        tagline: "Tu vois la vie que tu veux. Tu n'oses pas y aller.",
        color: "#C04E2C",
        accent: "#F4D9CE",
        description: "Ambition immense, urgence brûlante, mais quelque chose te paralyse au moment d'agir. Tu sais exactement ce que tu veux. C'est ça qui te terrifie.",
      },
      sceptique_brule: {
        id: "sceptique_brule",
        emoji: "🛡️",
        nom: "La Sceptique Brûlée",
        tagline: "Tu as déjà essayé. Tu as déjà perdu. Tu ne crois plus rien.",
        color: "#8B6F2C",
        accent: "#EFE3C2",
        description: "Tu as goûté à la promesse. Elle a trahi. Maintenant chaque opportunité ressemble à un piège. Ton problème n'est pas la méfiance — c'est que tu ne sais plus distinguer le vrai du faux.",
      },
      prete_a_partir: {
        id: "prete_a_partir",
        emoji: "🚀",
        nom: "La Prête à Partir",
        tagline: "Tu es plus proche que tu ne le crois. Vraiment.",
        color: "#5C8270",
        accent: "#D7E5DD",
        description: "Tout est aligné. La vision est claire, l'envie est là, l'énergie aussi. Il te manque une seule chose : la certitude que c'est ton moment. Arrête de chercher — commence.",
      },
      perdue_confortable: {
        id: "perdue_confortable",
        emoji: "🌫️",
        nom: "La Perdue Confortable",
        tagline: "Ta vie n'est pas mauvaise. Elle est juste pas la tienne.",
        color: "#5E7384",
        accent: "#D7DEE5",
        description: "Tu fonctionnes. Tu remplis. Tu existes. Mais au fond, tu sais qu'il y a autre chose. Le vrai danger pour toi n'est pas l'échec — c'est que rien ne change pendant 10 ans.",
      },
      prisonniere_sociale: {
        id: "prisonniere_sociale",
        emoji: "⛓️",
        nom: "La Prisonnière Sociale",
        tagline: "Ton plus gros obstacle ne vit pas dans ta tête.",
        color: "#7B3F52",
        accent: "#EBD5DC",
        description: "Ton ambition est intacte. Mais elle est étouffée par les regards de ceux qui t'entourent. Chaque fois que tu essaies de t'élever, tu sens leur poids te tirer en arrière.",
      },
      hyperactive_dispersee: {
        id: "hyperactive_dispersee",
        emoji: "🎭",
        nom: "L'Hyperactive Dispersée",
        tagline: "1000 idées. Zéro execution. Tu connais le pattern.",
        color: "#C76B45",
        accent: "#F5DDD0",
        description: "Tu as plus d'idées que 10 personnes réunies. Le problème n'est pas ton cerveau — c'est que tu commences tout et termines rien. Il te faut une seule chose : un rail.",
      },
    };

    // ── SECTION 3: SCORING LOGIC ──
    function computeScores(answers) {
      // answers = [optionIndex, optionIndex, ...] (un index par question)
      const scores = {
        ambition: 0, urgence: 0, douleur: 0, discipline: 0, confiance: 0,
        vision: 0, action: 0, scepticisme: 0, ent_toxique: 0, arg_peur: 0,
        bloc_methode: 0, bloc_argent: 0, bloc_entourage: 0, bloc_confiance: 0,
        bloc_discipline: 0, valeur_famille: 0, valeur_liberte: 0, valeur_creation: 0,
        force_resilience: 0, force_creativite: 0, force_empathie: 0, force_apprentissage: 0,
      };

      answers.forEach((optIdx, qIdx) => {
        const opt = questions[qIdx]?.options[optIdx];
        if (!opt) return;
        Object.entries(opt.s || {}).forEach(([key, val]) => {
          scores[key] = (scores[key] || 0) + val;
        });
      });

      return scores;
    }

    function detectArchetype(scores) {
      // On calcule un "match score" pour chaque archétype
      const matches = {
        reveur_piege:
          scores.ambition * 2 + scores.urgence * 2 + scores.douleur -
          scores.action - scores.discipline,
        sceptique_brule:
          scores.scepticisme * 3 + scores.bloc_confiance * 2 -
          scores.confiance + scores.arg_peur,
        prete_a_partir:
          scores.action * 2 + scores.vision * 2 + scores.discipline +
          scores.confiance - scores.scepticisme,
        perdue_confortable:
          -scores.urgence * 2 - scores.vision + scores.douleur * 0.5 -
          scores.ambition,
        prisonniere_sociale:
          scores.ent_toxique * 3 + scores.bloc_entourage * 2 +
          scores.ambition - scores.confiance,
        hyperactive_dispersee:
          scores.bloc_discipline * 2 - scores.discipline +
          scores.force_creativite + Math.max(0, scores.action),
      };

      // L'archétype gagnant
      const winner = Object.entries(matches).reduce((best, [id, score]) =>
        score > best.score ? { id, score } : best
      , { id: "perdue_confortable", score: -Infinity });

      return { archetype: winner.id, matches, scores };
    }

    // Trouve le blocage dominant (pour les seller_notes)
    function dominantBlocage(scores) {
      const blocs = {
        methode: scores.bloc_methode,
        argent: scores.bloc_argent,
        entourage: scores.bloc_entourage,
        confiance: scores.bloc_confiance,
        discipline: scores.bloc_discipline,
      };
      return Object.entries(blocs).reduce((best, [k, v]) =>
        v > best.v ? { k, v } : best
      , { k: "methode", v: -Infinity }).k;
    }

    // ── SECTION 4: SYSTEM PROMPT IA ──
    function buildPrompt(answers, archetype, scores) {
      const arch = ARCHETYPES[archetype];
      const blocageDom = dominantBlocage(scores);

      // Format des réponses choisies
      const formatted = answers.map((optIdx, qIdx) => {
        const q = questions[qIdx];
        const opt = q.options[optIdx];
        return `Q${qIdx + 1} : ${q.text}\n→ ${opt.emoji} ${opt.label}`;
      }).join("\n\n");

      // Top 5 dimensions (les plus saillantes)
      const topDims = Object.entries(scores)
        .filter(([k, v]) => v !== 0)
        .sort((a, b) => Math.abs(b[1]) - Math.abs(a[1]))
        .slice(0, 8)
        .map(([k, v]) => `${k}: ${v > 0 ? "+" : ""}${v}`)
        .join(", ");

      return `Tu es un coach expert en psychologie comportementale et reconversion professionnelle. Tu produis un bilan ULTRA personnalisé et diagnostique pour une femme qui vient de répondre à 15 questions à choix multiples.

ARCHÉTYPE DÉTECTÉ : ${arch.emoji} ${arch.nom}
TAGLINE OFFICIELLE : ${arch.tagline}
DESCRIPTION DU PROFIL : ${arch.description}

DIMENSIONS PSYCHOLOGIQUES MESURÉES :
${topDims}

BLOCAGE DOMINANT : ${blocageDom}

RÉPONSES CHOISIES :
${formatted}

═══════════════════════════════════════
INSTRUCTIONS CRITIQUES POUR TON BILAN :
═══════════════════════════════════════

1. NE REFORMULE PAS ses réponses. Elle sait déjà ce qu'elle a coché.
2. RÉVÈLE des choses qu'elle n'a JAMAIS formulées sur elle-même.
3. NOMME le pattern inconscient qu'elle répète sans le voir.
4. SOIS direct, presque brutal — comme une amie ultra-lucide qui dit la vérité.
5. UTILISE le "tu" — chaud, intime, jamais condescendant.
6. PAS de jargon coach mou ("tu mérites tellement", "tu as un potentiel énorme"). PARLE VRAI.
7. Chaque phrase doit être SPÉCIFIQUE à son archétype, pas générique.

Réponds UNIQUEMENT avec ce JSON, rien d'autre :

{
  "portrait_brutal": "3-4 phrases qui dressent SON portrait psychologique. Commence par une affirmation qui la fige. Nomme ce que personne n'a osé lui dire. Sois précis avec son archétype ${arch.nom}.",
  "pattern_invisible": "1 phrase qui décrit le pattern qu'elle répète inconsciemment. Format : 'Tu fais X parce que tu crois que Y, mais en vérité Z.' Doit être troublant de précision.",
  "fausse_croyance": "1 phrase qui nomme la fausse croyance qui la bloque. Une phrase qu'elle n'a jamais formulée mais qui dirige sa vie. Format : 'Tu crois que [croyance], et c'est ce qui te bloque.'",
  "declic_specifique": "2-3 phrases qui décrivent LE déclic dont elle a besoin — adapté à SON archétype ${arch.nom}. Pas un conseil générique. Une révélation.",
  "premier_pas": "1-2 phrases : LE premier pas concret qu'elle peut faire CETTE SEMAINE. Adapté à son archétype et son blocage dominant (${blocageDom}). Doit être minuscule mais symbolique.",
  "phrase_miroir": "LA phrase qui va la retourner. Une seule phrase, courte (max 15 mots), qui résume tout. La phrase qu'elle va screenshotter.",
  "code_liberte_lien": "2-3 phrases qui expliquent pourquoi Code Liberté est SPÉCIFIQUEMENT le bon véhicule pour SON archétype ${arch.nom}. Pas une description générique. Connecte les points entre son blocage (${blocageDom}) et ce que Code Liberté offre.",
  "verdict": "oui | bientot | non",
  "verdict_raison": "1-2 phrases qui justifient le verdict. Direct.",
  "seller_notes": {
    "archetype": "${arch.nom}",
    "temperature": "froid | tiede | chaud",
    "blocage_dominant": "${blocageDom}",
    "urgence": "faible | moyenne | forte",
    "action_recommandee": "Quoi faire avec ce profil (court)",
    "ton_a_adopter": "Comment lui parler en vente (court)"
  }
}`;
    }
